---
extends: default

ignore: |
  node_modules/**
  target/**
  **/target/**
  **/.lake/**
  packages/sdk/dist/**
  packages/sdk/public/engine/**
  packages/sdk/playwright-report/**
  packages/sdk/test-results/**

rules:
  braces:
    max-spaces-inside: 1
  brackets:
    max-spaces-inside: 1
  colons:
    max-spaces-after: 1
  comments:
    min-spaces-from-content: 1
  comments-indentation: enable
  document-start: disable
  empty-lines:
    max: 2
    max-end: 1
  indentation:
    spaces: 2
    indent-sequences: consistent
  line-length:
    max: 140
    level: warning
  truthy:
    allowed-values: ['true', 'false', 'on', 'off']
    check-keys: false
