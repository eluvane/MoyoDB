name: MoyoDB paranoid quality

on:
  workflow_dispatch:
  schedule:
    - cron: '30 4 * * 2'

permissions:
  contents: read
  actions: read

env:
  NODE_VERSION: '22'
  RUST_TOOLCHAIN: '1.91.0'

jobs:
  paranoid-linters:
    name: MoyoDB paranoid quality and security
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.4'
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: dtolnay/rust-toolchain@1.91.0
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Install Node dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund --prefer-online --registry=https://registry.npmjs.org/
      - name: Install external paranoid tooling
        run: |
          set -euo pipefail
          python -m pip install --user yamllint==1.38.0 'setuptools<81' semgrep==1.102.0
          go install github.com/zricethezav/gitleaks/v8@v8.30.1
          go install github.com/google/osv-scanner/v2/cmd/osv-scanner@v2.4.0
          cargo install --locked cargo-deny --version 0.19.8
          cargo install --locked cargo-machete --version 0.9.2
          cargo install --locked wasm-pack --version 0.15.0
          echo "${HOME}/go/bin" >> "$GITHUB_PATH"
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
      - name: Install Playwright browsers
        run: npm exec --workspace @moyodb/sdk -- playwright install --with-deps
      - name: Run paranoid local gate
        run: npm run check:paranoid
